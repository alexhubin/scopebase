name: scopebase

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scopebase
      POSTGRES_USER: scopebase
      POSTGRES_PASSWORD: scopebase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scopebase -d scopebase"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: scopebase
      MINIO_ROOT_PASSWORD: scopebase-secret
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:v1.24
    ports:
      - "8025:8025"

  backend:
    build:
      context: ./backend
    env_file: .env
    command: ["sh", "-c", "uv run alembic upgrade head && uv run python -m app.seed && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: /api
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2.10-alpine
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "3000:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  minio_data:
  frontend_modules:
  caddy_data:
  caddy_config:


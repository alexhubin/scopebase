name: scopebase

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: ${S3_CORS_ORIGINS}
    ports:
      - "127.0.0.1:${SCOPEBASE_STORAGE_PORT:-3090}:9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - minio_data:/data
    networks:
      default:
      caddy:
        aliases:
          - scopebase-storage

  mailpit:
    image: axllent/mailpit:v1.24
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SCOPEBASE_MAILPIT_PORT:-8026}:8025"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env.production
    command: ["sh", "-c", "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      target: production
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy

  gateway:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SCOPEBASE_HTTP_PORT:-3080}:80"
    volumes:
      - ./infrastructure/caddy/Caddyfile.internal:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - backend
    networks:
      default:
      caddy:
        aliases:
          - scopebase-gateway

volumes:
  postgres_data:
  minio_data:

networks:
  caddy:
    external: true
    name: ${CADDY_NETWORK:-caddy-proxy}
